<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Stage &amp; Studio Productions — Digital Card</title>
<style>
:root{--bg:#ffffff;--ink:#1a1a1a;--muted:#6b6b6b;--blue:#2d2d72;--blue-dark:#20204f;--border:#e6e6e6;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#f2f2f2}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 18px;}
.card{width:100%;max-width:380px;background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:38px 30px 32px;box-shadow:0 20px 50px -20px rgba(0,0,0,0.18);}
.mark{display:flex;justify-content:center;margin-bottom:20px}
.mark img{height:34px;width:auto;display:block}
.avatar{display:flex;justify-content:center;margin-bottom:14px}
.avatar img{width:88px;height:88px;border-radius:50%;object-fit:cover;border:2px solid var(--border);display:block}
.hr{height:1px;background:var(--border);margin:22px 0}
.id-block{text-align:center}
.name{font-weight:700;font-size:1.7rem;letter-spacing:-0.01em;line-height:1.15;color:var(--ink)}
.title{margin-top:6px;font-weight:600;font-size:0.9rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--blue)}
.company{margin-top:4px;font-size:0.82rem;letter-spacing:0.02em;color:var(--muted)}
.actions{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 18px;border-radius:10px;font-weight:600;font-size:0.88rem;letter-spacing:0.03em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:1px solid transparent;transition:transform 0.15s ease;}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--blue);color:#ffffff}
.btn-primary:active{background:var(--blue-dark)}
.btn-secondary{background:#ffffff;border-color:var(--blue);color:var(--blue)}
.btn svg{width:17px;height:17px;flex:none}
.row{display:flex;gap:10px}
.row .btn{flex:1;padding:13px 10px;font-size:0.78rem}
.footer-note{margin-top:26px;text-align:center;font-size:0.68rem;letter-spacing:0.06em;text-transform:uppercase;color:#a0a0a0}
@media (max-width:340px){.card{padding:30px 20px 26px}.name{font-size:1.5rem}}
</style>
</head>

<script>var CONTACT = {"name":"Dennis Didovich","org":"Stage & Studio Productions","title":"Operation Manager","phone":"0400523927","email":"operations@stageandstudio.com.au","website":"https://linktr.ee/Stageandstudio"};
function buildVCard(c){
  var parts = c.name.trim().split(/\s+/);
  var first = parts.shift() || '';
  var last = parts.join(' ');
  return ['BEGIN:VCARD','VERSION:3.0','N:'+last+';'+first+';;;','FN:'+c.name,'ORG:'+c.org,'TITLE:'+(c.title||''),'TEL;TYPE=CELL:'+c.phone,'EMAIL;TYPE=WORK:'+c.email,'URL:'+c.website,'END:VCARD'].join('\r\n');
}
document.getElementById('saveContactBtn').addEventListener('click', function(e){
  e.preventDefault();
  var vcard = buildVCard(CONTACT);
  var blob = new Blob([vcard], {type:'text/vcard;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = CONTACT.name.replace(/\s+/g,'_') + '.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
});
</script>
